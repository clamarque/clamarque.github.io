<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#00FFA3" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00FFA3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="70%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFA3"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B0B0BF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#07070b"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <rect width="1200" height="630" fill="url(#g3)"/>

  <!-- Status pill -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" rx="999" ry="999" width="320" height="44"
          fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <circle cx="22" cy="22" r="5" fill="#00FFA3"/>
    <text x="40" y="29" font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="13" letter-spacing="2" fill="#7A7A89">
      AVAILABLE FOR FREELANCE
    </text>
  </g>

  <!-- Logo placeholder badge -->
  <g transform="translate(80, 170)">
    <rect x="0" y="0" rx="14" ry="14" width="64" height="64"
          fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="32" y="44" text-anchor="middle"
          font-family="'Space Grotesk', system-ui, sans-serif"
          font-size="32" font-weight="700" fill="url(#accent)">C</text>
  </g>

  <!-- Title -->
  <text x="80" y="320"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="84" font-weight="700" letter-spacing="-3"
        fill="url(#title)">
    Charles Lamarque
  </text>

  <!-- Tagline lines -->
  <text x="80" y="400"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="44" font-weight="600" letter-spacing="-1.5"
        fill="#F4F4F7">
    I build web products that are
  </text>
  <text x="80" y="460"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="44" font-weight="700" letter-spacing="-1.5"
        fill="url(#accent)">
    fast, reliable &amp; beautiful.
  </text>

  <!-- Footer meta -->
  <text x="80" y="560"
        font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="16" letter-spacing="3" fill="#7A7A89">
    FULL-STACK JS · LILLE, FR · CLAMARQUE.GITHUB.IO
  </text>
</svg>
